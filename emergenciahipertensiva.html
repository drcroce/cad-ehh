<style>
    :root {
        --primary-clinical: #2b4c7e;
        --primary-light: #eef4fc;
        --success-clinical: #2e7d32;
        --success-light: #e8f5e9;
        --error-clinical: #c62828;
        --error-light: #ffebee;
        --text-main: #333333;
        --text-muted: #666666;
        --border-color: #dddddd;
    }

    .quiz-selector {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    .quiz-sel-btn {
        background-color: #ffffff;
        border: 1px solid var(--border-color);
        padding: 10px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        color: var(--text-main);
        transition: all 0.2s ease;
    }

    .quiz-sel-btn.active {
        background-color: var(--primary-clinical);
        color: #ffffff;
        border-color: var(--primary-clinical);
    }

    .question-card {
        background: #ffffff;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        border: 1px solid var(--border-color);
        margin-bottom: 20px;
    }

    .question-text {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 15px;
    }

    .option-item {
        padding: 12px 15px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        margin-bottom: 10px;
        cursor: pointer;
        transition: background-color 0.2s;
        font-size: 0.95rem;
    }

    .option-item:hover {
        background-color: var(--primary-light);
    }

    .option-item.correct {
        background-color: var(--success-light) !important;
        border-color: var(--success-clinical) !important;
        color: var(--success-clinical);
        font-weight: 600;
    }

    .option-item.incorrect {
        background-color: var(--error-light) !important;
        border-color: var(--error-clinical) !important;
        color: var(--error-clinical);
    }

    .feedback-box {
        margin-top: 15px;
        padding: 12px;
        background-color: #fff9db;
        border-left: 4px solid #f59f00;
        border-radius: 4px;
        font-size: 0.9rem;
        color: #664d03;
    }

    .quiz-nav {
        display: flex;
        justify-content: space-between;
        margin-top: 15px;
    }

    .nav-btn {
        padding: 10px 20px;
        border-radius: 6px;
        border: 1px solid var(--border-color);
        background-color: #ffffff;
        cursor: pointer;
        font-weight: 600;
    }

    .nav-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .nav-btn.primary {
        background-color: var(--primary-clinical);
        color: #ffffff;
        border-color: var(--primary-clinical);
    }

    .score-screen {
        text-align: center;
        background: #ffffff;
        border-radius: 8px;
        padding: 30px;
        border: 1px solid var(--border-color);
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .score-circle {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background-color: var(--primary-light);
        color: var(--primary-clinical);
        font-size: 2rem;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 15px auto;
        border: 3px solid var(--primary-clinical);
    }
</style>

<div class="quiz-selector">
    <button class="quiz-sel-btn active" id="btn-q-0" onclick="selectQuiz(0)">Quiz 1: Fisiopatología</button>
    <button class="quiz-sel-btn" id="btn-q-1" onclick="selectQuiz(1)">Quiz 2: Cardio y Gestación</button>
</div>
                
<div class="question-card" id="quiz-wrapper">
    <div id="quiz-container">
        <div class="question-text" id="question-text">Seleccione un quiz para comenzar.</div>
        <div class="options-list" id="options-list"></div>
        <div class="feedback-box" id="feedback-box" style="display: none;"></div>
    </div>
    <div class="quiz-nav">
        <button class="nav-btn" id="prev-btn" onclick="changeQuestion(-1)" disabled>Anterior</button>
        <button class="nav-btn primary" id="next-btn" onclick="changeQuestion(1)" disabled>Siguiente</button>
    </div>
</div>
                
<div class="score-screen" id="score-screen" style="display: none;">
    <div class="score-circle" id="score-circle">0%</div>
    <h3>¡Evaluación Finalizada!</h3>
    <p id="score-text" style="margin-bottom: 20px; color: var(--text-muted);"></p>
    <button class="nav-btn primary" onclick="reiniciarQuiz()">Reiniciar Quiz</button>
</div>

</div>
</main>
</div>

<script>
    // ==========================================
    // 1. SISTEMA DE ACCESO Y SEGURIDAD (CON CONTROL DE ERRORES)
    // ==========================================
    function verificarClave() {
        const claveCorrecta = "URGENCIAS"; 
        const passInput = document.getElementById("pass-input");
        if (!passInput) {
            // Si no encuentra la pantalla de login, inicializa directamente el quiz de forma segura
            selectQuiz(0);
            return;
        }

        const input = passInput.value.trim().toUpperCase();
        const errorMsg = document.getElementById("login-err-msg");
        
        if (input === claveCorrecta) {
            const loginScreen = document.getElementById("login-screen");
            const appScreen = document.getElementById("app-screen");
            
            if (loginScreen) loginScreen.style.display = "none";
            if (appScreen) appScreen.style.display = "block";
            
            calcularMetas();
            selectQuiz(0);
        } else {
            if (errorMsg) errorMsg.style.display = "block";
        }
    }

    // Listener seguro para la tecla Enter
    const passInputEl = document.getElementById("pass-input");
    if (passInputEl) {
        passInputEl.addEventListener("keypress", function(e) {
            if (e.key === "Enter") verificarClave();
        });
    }

    // ==========================================
    // 2. NAVEGACIÓN DINÁMICA POR PESTAÑAS
    // ==========================================
    function switchTab(tabIndex) {
        const tabs = document.querySelectorAll(".tab-content");
        const buttons = document.querySelectorAll(".tab-btn");
        
        tabs.forEach((tab, index) => {
            tab.classList.toggle("active", index === tabIndex);
        });
        
        buttons.forEach((btn, index) => {
            btn.classList.toggle("active", index === tabIndex);
        });
    }

    // ==========================================
    // 3. TARJETAS ACORDÉÓN (EXPANDIBLES)
    // ==========================================
    function toggleCard(headerElement) {
        const card = headerElement.parentElement;
        if (card) card.classList.toggle("expanded");
    }

    // ==========================================
    // 4. CALCULADORA DINÁMICA DE METAS PAM (CON VALIDACIÓN DE EXISTENCIA)
    // ==========================================
    function calcularMetas() {
        const pasIn = document.getElementById("pas-in");
        const padIn = document.getElementById("pad-in");
        
        // Si no existen estos elementos en la página actual, la función se detiene pacíficamente sin romper el script
        if (!pasIn || !padIn) return; 

        const pas = parseFloat(pasIn.value) || 0;
        const pad = parseFloat(padIn.value) || 0;
        
        const pamActualEl = document.getElementById("pam-actual");
        const pamMeta20El = document.getElementById("pam-meta-20");
        const pamMeta25El = document.getElementById("pam-meta-25");

        if (pas > 0 && pad > 0) {
            const pamActual = pad + ((pas - pad) / 3);
            const meta20 = pamActual * 0.80; 
            const meta25 = pamActual * 0.75; 
            
            if (pamActualEl) pamActualEl.textContent = pamActual.toFixed(1);
            if (pamMeta20El) pamMeta20El.textContent = meta20.toFixed(1);
            if (pamMeta25El) pamMeta25El.textContent = meta25.toFixed(1);
        } else {
            if (pamActualEl) pamActualEl.textContent = "0.0";
            if (pamMeta20El) pamMeta20El.textContent = "0.0";
            if (pamMeta25El) pamMeta25El.textContent = "0.0";
        }
    }

    // ==========================================
    // 5. BANCO DE PREGUNTAS INTERACTIVO (QUIZ)
    // ==========================================
    const quizzes = [
        {
            title: "Quiz 1: Fisiopatología",
            questions: [
                {
                    q: "¿Cuál es el elemento diferenciador crítico entre una Emergencia y una Urgencia Hipertensiva?",
                    options: [
                        "La cifra absoluta transitoria de PAS > 220 mmHg",
                        "La presencia evidente de daño agudo y evolutivo a órgano diana (DOD)",
                        "La velocidad de instauración cronológica del pico hipertensivo",
                        "La carga genética y antecedentes cardiovasculares directos"
                    ],
                    correct: 1,
                    feedback: "Correcto. La afectación aguda de órgano diana (cerebro, miocardio, aorta, riñón o retina) define la emergencia clínica e impone el uso inmediato de terapia endovenosa."
                },
                {
                    q: "Al descender de forma drástica la PA en un hipertenso crónico severo por debajo de sus límites basales, ¿qué riesgo yatrógeno inminente se induce?",
                    options: [
                        "Hemorragia subaracnoidea refleja",
                        "Hipoperfusión tisular cerebral crítica con riesgo de infarto isquémico",
                        "Edema agudo de pulmón por sobrecarga súbita de la precarga",
                        "Encefalopatía hipertensiva de rebote"
                    ],
                    correct: 1,
                    feedback: "Correcto. En hipertensos crónicos, la curva de autorregulación del flujo sanguíneo cerebral está desplazada a la derecha. Un descenso rápido > 25% compromete gravemente la perfusión cerebral."
                }
            ]
        },
        {
            title: "Quiz 2: Cardio y Gestación",
            questions: [
                {
                    q: "En una Disección Aórtica Aguda, ¿cuál es el abordaje cronológico de primera línea exigido?",
                    options: [
                        "Iniciar Nitroprusiato de Sodio puro de inmediato para tumbar la PA.",
                        "Controlar primero la FC (< 60 lpm) con beta-bloqueadores (Esmolol/Labetalol) y luego reducir la PAS (< 120 mmHg).",
                        "Administrar dosis masivas de diuréticos de asa EV antes de los vasodilatadores.",
                        "Mantener la PAM elevada para garantizar el flujo en las falsas luces."
                    ],
                    correct: 1,
                    feedback: "Correcto. El uso de vasodilatadores puros sin bloqueo beta previo induce taquicardia refleja y aumenta la fuerza de eyección ventricular (dP/dt), lo que expande y propaga la disección de la íntima."
                }
            ]
        }
    ];

    let currentQuizIndex = 0;
    let currentQuestionIndex = 0;
    let userAnswers = {};

    function selectQuiz(quizIdx) {
        currentQuizIndex = quizIdx;
        currentQuestionIndex = 0;
        userAnswers = {};
        
        const btnQ0 = document.getElementById("btn-q-0");
        const btnQ1 = document.getElementById("btn-q-1");
        if (btnQ0) btnQ0.classList.toggle("active", quizIdx === 0);
        if (btnQ1) btnQ1.classList.toggle("active", quizIdx === 1);
        
        const scoreScreen = document.getElementById("score-screen");
        const quizWrapper = document.getElementById("quiz-wrapper");
        
        if (scoreScreen) scoreScreen.style.display = "none";
        if (quizWrapper) quizWrapper.style.display = "block";
        
        loadQuestion();
    }

    function loadQuestion() {
        const quiz = quizzes[currentQuizIndex];
        const qData = quiz.questions[currentQuestionIndex];
        
        const qTextEl = document.getElementById("question-text");
        if (qTextEl) qTextEl.textContent = qData.q;
        
        const optionsList = document.getElementById("options-list");
        if (!optionsList) return;
        optionsList.innerHTML = "";
        
        const feedbackBox = document.getElementById("feedback-box");
        if (feedbackBox) feedbackBox.style.display = "none";
        
        qData.options.forEach((option, idx) => {
            const div = document.createElement("div");
            div.className = "option-item";
            div.textContent = option;
            
            if (userAnswers[currentQuestionIndex] !== undefined) {
                if (idx === qData.correct) div.classList.add("correct");
                if (userAnswers[currentQuestionIndex] === idx && idx !== qData.correct) div.classList.add("incorrect");
            } else {
                div.onclick = () => checkAnswer(idx);
            }
            
            optionsList.appendChild(div);
        });
        
        if (userAnswers[currentQuestionIndex] !== undefined && feedbackBox) {
            feedbackBox.textContent = qData.feedback;
            feedbackBox.style.display = "block";
        }
        
        const prevBtn = document.getElementById("prev-btn");
        const nextBtn = document.getElementById("next-btn");
        
        if (prevBtn) prevBtn.disabled = currentQuestionIndex === 0;
        if (nextBtn) {
            nextBtn.disabled = userAnswers[currentQuestionIndex] === undefined;
            if (currentQuestionIndex === quiz.questions.length - 1) {
                nextBtn.textContent = "Finalizar Evaluación";
            } else {
                nextBtn.textContent = "Siguiente Pregunta";
            }
        }
    }

    function checkAnswer(selectedIdx) {
        userAnswers[currentQuestionIndex] = selectedIdx;
        loadQuestion();
    }

    function changeQuestion(direction) {
        const quiz = quizzes[currentQuizIndex];
        currentQuestionIndex += direction;
        
        if (currentQuestionIndex >= quiz.questions.length) {
            showScore();
        } else {
            loadQuestion();
        }
    }

    function showScore() {
        const quiz = quizzes[currentQuizIndex];
        let correctCount = 0;
        
        quiz.questions.forEach((q, idx) => {
            if (userAnswers[idx] === q.correct) correctCount++;
        });
        
        const percentage = Math.round((correctCount / quiz.questions.length) * 100);
        
        const quizWrapper = document.getElementById("quiz-wrapper");
        const scoreScreen = document.getElementById("score-screen");
        
        if (quizWrapper) quizWrapper.style.display = "none";
        if (scoreScreen) scoreScreen.style.display = "block";
        
        const scoreCircle = document.getElementById("score-circle");
        const scoreText = document.getElementById("score-text");
        
        if (scoreCircle) scoreCircle.textContent = percentage + "%";
        if (scoreText) scoreText.textContent = `Ha contestado correctamente ${correctCount} de ${quiz.questions.length} planteamientos clínicos.`;
    }

    function reiniciarQuiz() {
        selectQuiz(currentQuizIndex);
    }

    // Inicialización automática de respaldo por seguridad si no requiere contraseña previa
    window.addEventListener('DOMContentLoaded', () => {
        const loginScreen = document.getElementById("login-screen");
        if (!loginScreen || loginScreen.style.display === "none") {
            selectQuiz(0);
        }
    });
</script>
