<div class="quiz-selector">
                    <button class="quiz-sel-btn active" id="btn-q-0" onclick="selectQuiz(0)">Quiz 1: Fisiopatología</button>
                    <button class="quiz-sel-btn" id="btn-q-1" onclick="selectQuiz(1)">Quiz 2: Cardio y Gestación</button>
                </div>
                
                <div class="question-card" id="quiz-wrapper">
                    <div id="quiz-container">
                        <div class="question-text" id="question-text">Seleccione un quiz para comenzar.</div>
                        <div class="options-list" id="options-list"></div>
                        <div class="feedback-box" id="feedback-box"></div>
                    </div>
                    <div class="quiz-nav">
                        <button class="nav-btn" id="prev-btn" onclick="changeQuestion(-1)" disabled>Anterior</button>
                        <button class="nav-btn primary" id="next-btn" onclick="changeQuestion(1)" disabled>Siguiente</button>
                    </div>
                </div>
                
                <div class="score-screen" id="score-screen">
                    <div class="score-circle" id="score-circle">0%</div>
                    <h3>¡Evaluación Finalizada!</h3>
                    <p id="score-text" style="margin-bottom: 20px; color: var(--text-muted);"></p>
                    <button class="nav-btn primary" onclick="reiniciarQuiz()">Reiniciar Quiz</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ==========================================
        // 1. SISTEMA DE ACCESO Y SEGURIDAD
        // ==========================================
        function verificarClave() {
            // NOTA: Puede cambiar "URGENCIAS" por la palabra clave que usted prefiera usar
            const claveCorrecta = "URGENCIAS"; 
            const input = document.getElementById("pass-input").value.trim().toUpperCase();
            const errorMsg = document.getElementById("login-err-msg");
            
            if (input === claveCorrecta) {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("app-screen").style.display = "block";
                
                // Inicializaciones automáticas al entrar
                calcularMetas();
                selectQuiz(0);
            } else {
                errorMsg.style.display = "block";
            }
        }

        // Permite el ingreso directo presionando la tecla Enter en el teclado
        document.getElementById("pass-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") verificarClave();
        });

        // ==========================================
        // 2. NAVEGACIÓN DINÁMICA POR PESTAÑAS
        // ==========================================
        function switchTab(tabIndex) {
            const tabs = document.querySelectorAll(".tab-content");
            const buttons = document.querySelectorAll(".tab-btn");
            
            tabs.forEach((tab, index) => {
                tab.classList.toggle("active", index === tabIndex);
            });
            
            buttons.forEach((btn, index) => {
                btn.classList.toggle("active", index === tabIndex);
            });
        }

        // ==========================================
        // 3. TARJETAS ACORDÉÓN (EXPANDIBLES)
        // ==========================================
        function toggleCard(headerElement) {
            const card = headerElement.parentElement;
            card.classList.toggle("expanded");
        }

        // ==========================================
        // 4. CALCULADORA DINÁMICA DE METAS PAM
        // ==========================================
        function calcularMetas() {
            const pas = parseFloat(document.getElementById("pas-in").value) || 0;
            const pad = parseFloat(document.getElementById("pad-in").value) || 0;
            
            if (pas > 0 && pad > 0) {
                // Fórmula clínica estándar: PAM = PAD + [(PAS - PAD) / 3]
                const pamActual = pad + ((pas - pad) / 3);
                const meta20 = pamActual * 0.80; // Límite seguro del 20%
                const meta25 = pamActual * 0.75; // Límite seguro del 25%
                
                document.getElementById("pam-actual").textContent = pamActual.toFixed(1);
                document.getElementById("pam-meta-20").textContent = meta20.toFixed(1);
                document.getElementById("pam-meta-25").textContent = meta25.toFixed(1);
            } else {
                document.getElementById("pam-actual").textContent = "0.0";
                document.getElementById("pam-meta-20").textContent = "0.0";
                document.getElementById("pam-meta-25").textContent = "0.0";
            }
        }

        // ==========================================
        // 5. BANCO DE PREGUNTAS INTERACTIVO (QUIZ)
        // ==========================================
        const quizzes = [
            {
                title: "Quiz 1: Fisiopatología",
                questions: [
                    {
                        q: "¿Cuál es el elemento diferenciador crítico entre una Emergencia y una Urgencia Hipertensiva?",
                        options: [
                            "La cifra absoluta transitoria de PAS > 220 mmHg",
                            "La presencia evidente de daño agudo y evolutivo a órgano diana (DOD)",
                            "La velocidad de instauración cronológica del pico hipertensivo",
                            "La carga genética y antecedentes cardiovasculares directos"
                        ],
                        correct: 1,
                        feedback: "Correcto. La afectación aguda de órgano diana (cerebro, miocardio, aorta, riñón o retina) define la emergencia clínica e impone el uso inmediato de terapia endovenosa."
                    },
                    {
                        q: "Al descender de forma drástica la PA en un hipertenso crónico severo por debajo de sus límites basales, ¿qué riesgo yatrógeno inminente se induce?",
                        options: [
                            "Hemorragia subaracnoidea refleja",
                            "Hipoperfusión tisular cerebral crítica con riesgo de infarto isquémico",
                            "Edema agudo de pulmón por sobrecarga súbita de la precarga",
                            "Encefalopatía hipertensiva de rebote"
                        ],
                        correct: 1,
                        feedback: "Correcto. En hipertensos crónicos, la curva de autorregulación del flujo sanguíneo cerebral está desplazada a la derecha. Un descenso rápido > 25% compromete gravemente la perfusión cerebral."
                    }
                ]
            },
            {
                title: "Quiz 2: Cardio y Gestación",
                questions: [
                    {
                        q: "En una Disección Aórtica Aguda, ¿cuál es el abordaje cronológico de primera línea exigido?",
                        options: [
                            "Iniciar Nitroprusiato de Sodio puro de inmediato para tumbar la PA.",
                            "Controlar primero la FC (< 60 lpm) con beta-bloqueadores (Esmolol/Labetalol) y luego reducir la PAS (< 120 mmHg).",
                            "Administrar dosis masivas de diuréticos de asa EV antes de los vasodilatadores.",
                            "Mantener la PAM elevada para garantizar el flujo en las falsas luces."
                        ],
                        correct: 1,
                        feedback: "Correcto. El uso de vasodilatadores puros sin bloqueo beta previo induce taquicardia refleja y aumenta la fuerza de eyección ventricular (dP/dt), lo que expande y propaga la disección de la íntima."
                    }
                ]
            }
        ];

        let currentQuizIndex = 0;
        let currentQuestionIndex = 0;
        let userAnswers = {};

        function selectQuiz(quizIdx) {
            currentQuizIndex = quizIdx;
            currentQuestionIndex = 0;
            userAnswers = {};
            
            document.getElementById("btn-q-0").classList.toggle("active", quizIdx === 0);
            document.getElementById("btn-q-1").classList.toggle("active", quizIdx === 1);
            
            document.getElementById("score-screen").style.display = "none";
            document.getElementById("quiz-wrapper").style.display = "block";
            
            loadQuestion();
        }

        function loadQuestion() {
            const quiz = quizzes[currentQuizIndex];
            const qData = quiz.questions[currentQuestionIndex];
            
            document.getElementById("question-text").textContent = qData.q;
            
            const optionsList = document.getElementById("options-list");
            optionsList.innerHTML = "";
            
            const feedbackBox = document.getElementById("feedback-box");
            feedbackBox.style.display = "none";
            
            qData.options.forEach((option, idx) => {
                const div = document.createElement("div");
                div.className = "option-item";
                div.textContent = option;
                
                if (userAnswers[currentQuestionIndex] !== undefined) {
                    if (idx === qData.correct) div.classList.add("correct");
                    if (userAnswers[currentQuestionIndex] === idx && idx !== qData.correct) div.classList.add("incorrect");
                } else {
                    div.onclick = () => checkAnswer(idx);
                }
                
                optionsList.appendChild(div);
            });
            
            if (userAnswers[currentQuestionIndex] !== undefined) {
                feedbackBox.textContent = qData.feedback;
                feedbackBox.style.display = "block";
            }
            
            document.getElementById("prev-btn").disabled = currentQuestionIndex === 0;
            const nextBtn = document.getElementById("next-btn");
            nextBtn.disabled = userAnswers[currentQuestionIndex] === undefined;
            
            if (currentQuestionIndex === quiz.questions.length - 1) {
                nextBtn.textContent = "Finalizar Evaluación";
            } else {
                nextBtn.textContent = "Siguiente Pregunta";
            }
        }

        function checkAnswer(selectedIdx) {
            userAnswers[currentQuestionIndex] = selectedIdx;
            loadQuestion();
        }

        function changeQuestion(direction) {
            const quiz = quizzes[currentQuizIndex];
            currentQuestionIndex += direction;
            
            if (currentQuestionIndex >= quiz.questions.length) {
                showScore();
            } else {
                loadQuestion();
            }
        }

        function showScore() {
            const quiz = quizzes[currentQuizIndex];
            let correctCount = 0;
            
            quiz.questions.forEach((q, idx) => {
                if (userAnswers[idx] === q.correct) correctCount++;
            });
            
            const percentage = Math.round((correctCount / quiz.questions.length) * 100);
            
            document.getElementById("quiz-wrapper").style.display = "none";
            const scoreScreen = document.getElementById("score-screen");
            scoreScreen.style.display = "block";
            
            document.getElementById("score-circle").textContent = percentage + "%";
            document.getElementById("score-text").textContent = `Ha contestado correctamente ${correctCount} de ${quiz.questions.length} planteamientos clínicos.`;
        }

        function reiniciarQuiz() {
            selectQuiz(currentQuizIndex);
        }
    </script>
</body>
</html>
